[workspace]
name = "subnautica-head-tracking"
version = "1.0.0"
description = "Head tracking mod for Subnautica using CameraUnlock shared library"
channels = ["conda-forge"]
platforms = ["win-64"]

[tasks]
sync = "git submodule update --remote cameraunlock-core"
setup-libs = "powershell -ExecutionPolicy Bypass -File scripts/setup-libs.ps1"
restore = { cmd = "dotnet restore src/SubnauticaHeadTracking/SubnauticaHeadTracking.csproj", depends-on = ["setup-libs"] }
build = { cmd = "dotnet build src/SubnauticaHeadTracking/SubnauticaHeadTracking.csproj -c Release", depends-on = ["restore"] }
install = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Release", depends-on = ["build"] }
package = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1", depends-on = ["build"] }
uninstall = "scripts\\uninstall.cmd"
clean = "dotnet clean src/SubnauticaHeadTracking/SubnauticaHeadTracking.csproj"

# Validate release readiness
validate-release = "powershell -ExecutionPolicy Bypass -File scripts/validate-release.ps1"

# Full release workflow - creates tag and pushes to trigger CI release
# Usage: pixi run release [version]
# Example: pixi run release 1.0.0
release = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1"
